<!doctype html><html lang="fa"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>نمایش شیوه‌نامه</title><link rel="stylesheet" href="style.css"><script src="pdf.min.js"></script></head><body>
<div class="topbar"><button onclick="history.back()">بازگشت</button><div id="title" class="title"></div><button onclick="location.href='index.html'">خانه</button></div>
<div class="viewer-controls"><button id="prev">قبلی</button><span id="counter" class="status"></span><button id="next">بعدی</button><input id="find" placeholder="جست‌وجو در این شیوه‌نامه"><button id="go">جست‌وجو</button></div>
<div id="msg" class="status">در حال بارگذاری…</div><div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<script>
const docs={lab:['آزمایشگاه علوم تجربی','lab.pdf'],literature:['ادبیات و علوم انسانی','literature.pdf'],energy:['انرژی‌های نوین','energy.pdf'],robotics:['رباتیک و هوش مصنوعی','robotics.pdf'],biotech:['زیست‌فناوری','biotech.pdf'],stem:['سلول‌های بنیادی','stem.pdf'],nuclear:['علوم و فنون هسته‌ای','nuclear.pdf'],nano:['نانوفناوری','nano.pdf'],aerospace:['هوافضا و دریا','aerospace.pdf'],astronomy:['نجوم و فناوری‌های فضایی','astronomy.pdf'],herbal:['گیاهان دارویی','herbal.pdf'],coding:['کدنویسی','coding.pdf']};
pdfjsLib.GlobalWorkerOptions.workerSrc='pdf.worker.min.js';let u=new URLSearchParams(location.search),id=u.get('doc')||'astronomy',page=+(u.get('page')||1),pdf=null,busy=false;document.getElementById('title').textContent=docs[id][0];document.getElementById('find').value=u.get('q')||'';
const pdfUrl=new URL('pdfs/'+docs[id][1],location.href).href;
pdfjsLib.getDocument({url:pdfUrl}).promise.then(x=>{pdf=x;page=Math.min(Math.max(1,page),pdf.numPages);render()}).catch(e=>{console.error(e);document.getElementById('msg').textContent='خطا در بازکردن فایل: '+(e&&e.message?e.message:'نامشخص')});
async function render(){if(busy)return;busy=true;let p=await pdf.getPage(page),base=p.getViewport({scale:1}),scale=Math.min(2.2,(innerWidth-16)/base.width*1.7),vp=p.getViewport({scale}),c=document.getElementById('canvas'),ctx=c.getContext('2d');c.width=vp.width;c.height=vp.height;await p.render({canvasContext:ctx,viewport:vp}).promise;document.getElementById('counter').textContent=`${page} از ${pdf.numPages}`;document.getElementById('msg').textContent='';scrollTo(0,0);busy=false}
document.getElementById('prev').onclick=()=>{if(page>1){page--;render()}};document.getElementById('next').onclick=()=>{if(page<pdf.numPages){page++;render()}};
document.getElementById('go').onclick=async()=>{let q=document.getElementById('find').value.trim();if(!q||!pdf)return;document.getElementById('msg').textContent='در حال جست‌وجو…';for(let i=page;i<=pdf.numPages;i++){let p=await pdf.getPage(i),tc=await p.getTextContent(),text=tc.items.map(x=>x.str).join(' ');if(text.includes(q)){page=i;document.getElementById('msg').textContent=`یافت شد: صفحه ${i}`;render();return}}document.getElementById('msg').textContent='از این صفحه به بعد یافت نشد.'}
</script></body></html>
